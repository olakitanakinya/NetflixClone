name: Build, Analyze, Scan & Deploy

on:
  push:
    branches:
      - main

jobs:
  build-analyze-scan:
    name: Build and Analyze
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      # SonarCloud Scan
      - name: SonarCloud Scan
        uses: sonarsource/sonarqube-scan-action@v2
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      # Trivy Filesystem Scan (fails on vulnerabilities)
      - name: Trivy FS Scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          severity: HIGH,CRITICAL
          exit-code: 1

      # Login to Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Setup Docker Buildx
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      # Build and Push Docker Image
      - name: Build and Push Image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/netflix:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/netflix:${{ github.sha }}
          build-args: |
            TMDB_V3_API_KEY=${{ secrets.TMDB_API_KEY }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy Application
    needs: build-analyze-scan
    runs-on: ubuntu-latest

    if: github.ref == 'refs/heads/main'

    steps:
      # Pull latest image
      - name: Pull Docker Image
        run: docker pull ${{ secrets.DOCKERHUB_USERNAME }}/netflix:latest

      # Scan Docker Image (fails if vulnerable)
      - name: Trivy Image Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ secrets.DOCKERHUB_USERNAME }}/netflix:latest
          severity: HIGH,CRITICAL
          exit-code: 1

      # Stop and remove old container
      - name: Remove old container
        run: docker rm -f netflix || true

      # Run new container
      - name: Run Container
        run: |
          docker run -d \
            --name netflix \
            --restart unless-stopped \
            -p 8081:80 \
            ${{ secrets.DOCKERHUB_USERNAME }}/netflix:latest

      # Health check
      - name: Health Check
        run: curl -f http://localhost:8081 || exit 1